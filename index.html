<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Expense & Budget Visualizer</h1>
  </header>

  <main>

    <!-- TOTAL BALANCE -->
    <section class="card" id="balance-card">
      <p class="label">TOTAL BALANCE</p>
      <h2 id="total-balance">$0.00</h2>
    </section>

    <!-- INPUT FORM -->
    <section class="card">
      <h3>Add Transaction</h3>
      <form id="transaction-form">
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" placeholder="e.g. Cilok" />

        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" placeholder="e.g. 14.94" />

        <label for="category">Category</label>
        <select id="category">
          <option value="">-- Select --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>

        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <div class="grid">
      <!-- TRANSACTION LIST -->
      <section class="card">
        <h3>Transactions</h3>
        <ul id="transaction-list">
          <!-- JS akan render <li> transaksi di sini -->
        </ul>
      </section>

      <!-- CHART -->
      <section class="card">
        <h3>Spending by Category</h3>
        <canvas id="category-chart"></canvas>
      </section>
    </div>

  </main>

  <!-- Chart.js dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
